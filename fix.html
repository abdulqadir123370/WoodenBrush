<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixing Brush Manufacturing Tracker...</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#5c3d1e;
    color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px; box-sizing:border-box; }
  .box { background:#fff; color:#333; padding:32px 28px; border-radius:14px; max-width:380px; width:100%;
    text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.25); }
  .spinner { border:4px solid #f0e8de; border-top:4px solid #5c3d1e; border-radius:50%;
    width:42px; height:42px; animation:spin 0.9s linear infinite; margin:0 auto 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size:16px; margin:0 0 6px; color:#5c3d1e; }
  p { font-size:13px; color:#888; margin:0; }
  a.btn { display:inline-block; margin-top:16px; padding:11px 22px; background:#5c3d1e; color:#fff;
    border-radius:8px; text-decoration:none; font-weight:700; font-size:14px; }
  .ok { color:#27ae60; font-weight:700; }
  .err { color:#e74c3c; font-weight:700; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Updating your app...</h1>
    <p id="sub">This only takes a second — please don't close this page.</p>
  </div>
<script>
async function fixIt(){
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const spinner = document.getElementById('spinner');
  try{
    let swCount = 0, cacheCount = 0;
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      swCount = regs.length;
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const names = await caches.keys();
      cacheCount = names.length;
      await Promise.all(names.map(n=>caches.delete(n)));
    }
    spinner.style.display='none';
    title.innerHTML = '<span class="ok">✅ Fixed!</span>';
    sub.textContent = swCount+cacheCount>0
      ? 'Cleared the old stuck version. Taking you back to the app...'
      : 'Nothing to clear here — this device was already up to date. Taking you back...';
    setTimeout(()=>{ location.href = './'; }, 1400);
  }catch(e){
    spinner.style.display='none';
    title.innerHTML = '<span class="err">⚠️ Couldn\'t fully clear it</span>';
    sub.innerHTML = 'Try again, or tap below to continue anyway.<br/><a class="btn" href="./">Open the app</a>';
  }
}
fixIt();
</script>
</body>
</html>
